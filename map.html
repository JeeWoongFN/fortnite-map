<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fortnite Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
height:100%;
}

#map{
width:100%;
height:100%;
background:#ddd;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 지도 생성
var map = L.map('map', {
crs: L.CRS.Simple,
minZoom:-2
});

// 이미지 크기 (현재 맵 기준)
var bounds = [[0,0],[2048,2048]];

// webp 지도 이미지
var image = L.imageOverlay("map.webp", bounds).addTo(map);

// 지도 화면 맞추기
map.fitBounds(bounds);

</script>

</body>
</html>
