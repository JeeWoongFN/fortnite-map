<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fortnite Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
height:100%;
background:#1e1e1e;
}

#map{
width:100%;
height:100%;
}

/* 지역 이름 스타일 */

.poi-label{
background:rgba(0,0,0,0);
border:none;
color:white;
font-size:18px;
font-weight:bold;
text-shadow:
2px 2px 4px black,
-2px -2px 4px black;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 지도 생성
var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1,
    maxZoom: 2,
    zoomSnap: 0.25
});

// 맵 이미지 크기 (현재 map.webp 기준)
var bounds = [[0,0],[2048,2048]];

// 맵 이미지 표시
var image = L.imageOverlay("map.png", bounds).addTo(map);

// 지도 중앙 맞추기
map.fitBounds(bounds);
map.setZoom(-0.5);


// 📍 지역 이름 추가 함수

function addPOI(x, y, name){

L.marker([x,y],{
opacity:0
})
.addTo(map)
.bindTooltip(name,{
permanent:true,
direction:"center",
className:"poi-label"
});

}


// 📍 지역 이름 표시 (예시)

addPOI(900,1100,"메가 시티");
addPOI(1400,900,"리테일 로우");
addPOI(700,1400,"브루탈 바스티온");
addPOI(1200,1500,"슬랩 주스 공장");
addPOI(600,800,"기울어진 탑");


// 현재 핑 저장
let currentPing = null;

// 지도 클릭 이벤트
map.on("click", function(e) {

    let x = Math.round(e.latlng.lng);
    let y = Math.round(e.latlng.lat);

    // 기존 핑 제거
    if(currentPing){
        map.removeLayer(currentPing);
    }

    // 새 핑 생성
    currentPing = L.marker([y, x]).addTo(map);

    // 팝업 표시
    currentPing.bindPopup(
        "📍 좌표<br>X: " + x + "<br>Y: " + y
    ).openPopup();

});

</script>

</body>
</html>
