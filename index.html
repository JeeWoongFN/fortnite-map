<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fortnite Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
padding:0;
height:100%;
background:#111;
}

#map{
width:100%;
height:100%;
}

/* POI 이름 */

.poi-label{
background:rgba(0,0,0,0);
border:none;
color:white;
font-size:18px;
font-weight:bold;
text-shadow:
2px 2px 4px black,
-2px -2px 4px black;
}

/* 핑 애니메이션 */

.ping-marker{
width:18px;
height:18px;
border-radius:50%;
position:relative;
}

.ping-marker::after{
content:'';
position:absolute;
width:18px;
height:18px;
border-radius:50%;
left:0;
top:0;
animation: pingPulse 1.5s infinite;
}

@keyframes pingPulse{
0%{
transform:scale(1);
opacity:0.9;
}
100%{
transform:scale(3);
opacity:0;
}
}

/* 핑 색상 버튼 */

#pingControls{
position:absolute;
top:10px;
right:10px;
z-index:1000;
background:rgba(0,0,0,0.5);
padding:6px;
border-radius:8px;
}

#pingControls button{
font-size:20px;
margin:2px;
cursor:pointer;
border:none;
background:none;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="pingControls">
<button onclick="setPingColor('red')">🔴</button>
<button onclick="setPingColor('blue')">🔵</button>
<button onclick="setPingColor('green')">🟢</button>
<button onclick="setPingColor('yellow')">🟡</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* 지도 생성 */

var map = L.map('map',{
crs: L.CRS.Simple,
minZoom: -1,
maxZoom: 2,
zoomSnap:0.25
});

/* 맵 이미지 크기 */

var bounds = [[0,0],[2048,2048]];

/* 맵 이미지 */

var image = L.imageOverlay("map.png", bounds).addTo(map);

map.fitBounds(bounds);

/* 시작 줌 */

map.setZoom(-0.3);

/* POI 함수 */

function addPOI(y,x,name){

L.tooltip({
permanent:true,
direction:"center",
className:"poi-label"
})
.setLatLng([y,x])
.setContent(name)
.addTo(map);

}

/* POI 위치 */

addPOI(1438,704,"웡키랜드");
addPOI(1366,444,"팁톱 테라스");
addPOI(1438,930,"클로지 랏지");
addPOI(1531,1225,"라떼 랜딩");
addPOI(1380,1399,"페인티드 팜스");
addPOI(1100,1335,"샌디 스트립");
addPOI(1037,897,"리썰 랩스");
addPOI(1063,1581,"포어 필즈");
addPOI(1034,519,"범피 베이");
addPOI(826,573,"험블 힐스");
addPOI(630,416,"립프드 타이드");
addPOI(547,778,"배틀우드 불러바드");
addPOI(664,1048,"서스 스튜디오");
addPOI(614,1291,"클래시파이드 캐니언");



/* 핑 시스템 */

let pingColor = "red";

function setPingColor(color){
pingColor = color;
}

/* 핑 생성 */

map.on("click", function(e){

const icon = L.divIcon({
className:'',
html:`<div class="ping-marker" style="background:${pingColor}"></div>`,
iconSize:[18,18],
iconAnchor:[9,9]
});

const marker = L.marker(e.latlng,{
icon:icon
}).addTo(map);

/* 우클릭 삭제 */

marker.on("contextmenu",function(){
map.removeLayer(marker);
});

});

</script>

</body>
</html>
