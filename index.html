<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fortnite Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
padding:0;
height:100%;
background:#111;
}

#map{
width:100%;
height:100%;
}

/* POI */

.poi-label{
background:rgba(0,0,0,0);
border:none;
color:white;
font-size:18px;
font-weight:bold;
text-shadow:2px 2px 4px black,-2px -2px 4px black;
}

/* 사이드바 */

#toolbar{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
background:rgba(20,20,20,0.75);
backdrop-filter:blur(8px);
padding:10px;
border-radius:12px;
z-index:1000;
display:flex;
flex-direction:column;
gap:8px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
}

/* 버튼 기본 */

#toolbar button{
width:42px;
height:42px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
transition:0.15s;
box-shadow:0 0 6px rgba(0,0,0,0.4);
}

/* Hover */

#toolbar button:hover{
transform:scale(1.08);
box-shadow:0 0 12px orange;
}

/* 선택 강조 */

.selectedTool{
background:#444 !important;
color:white !important;
box-shadow:0 0 10px orange !important;
}

/* 색상 선택 */

#colorPicker{
display:flex;
flex-direction:column;
gap:4px;
margin-top:6px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="toolbar">

<button onclick="setTool('ping',this)">📍</button>
<button onclick="setTool('line',this)">📏</button>

<button onclick="undoLast()">↶</button>
<button onclick="redoLast()">↷</button>
<button onclick="clearAll()">🗑</button>

<div id="colorPicker">
<button onclick="setPingColor('red',this)">🔴</button>
<button onclick="setPingColor('blue',this)">🔵</button>
<button onclick="setPingColor('green',this)">🟢</button>
<button onclick="setPingColor('yellow',this)">🟡</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* 지도 생성 */

var map = L.map('map',{
crs:L.CRS.Simple,
minZoom:-1,
maxZoom:2,
zoomSnap:0.25
});

var bounds=[[0,0],[2048,2048]];

L.imageOverlay("map.png",bounds).addTo(map);

map.fitBounds(bounds);
map.setZoom(-0.3);

/* POI */

function addPOI(y,x,name){
L.tooltip({
permanent:true,
direction:"center",
className:"poi-label"
})
.setLatLng([y,x])
.setContent(name)
.addTo(map);
}

/* POI */

addPOI(1438,704,"웡키랜드");
addPOI(1366,444,"팁톱 테라스");
addPOI(1438,930,"클로지 랏지");
addPOI(1531,1225,"라떼 랜딩");
addPOI(1380,1399,"페인티드 팜스");
addPOI(1100,1335,"샌디 스트립");
addPOI(1037,897,"리썰 랩스");
addPOI(1063,1581,"포어 필즈");
addPOI(1034,519,"범피 베이");
addPOI(826,573,"험블 힐스");
addPOI(630,416,"립프드 타이드");
addPOI(547,778,"배틀우드 불러바드");
addPOI(664,1048,"서스 스튜디오");
addPOI(614,1291,"클래시파이드 캐니언");

/* 핑 아이콘 */

const pingIcons={
red:new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
shadowSize:[41,41]
}),
blue:new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
shadowSize:[41,41]
}),
green:new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
shadowSize:[41,41]
}),
yellow:new L.Icon({
iconUrl:"https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png",
shadowUrl:"https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
iconSize:[25,41],
iconAnchor:[12,41],
shadowSize:[41,41]
})
};

/* 상태 */

let currentTool="ping";
let pingColor="red";

let linePoints=[];
let previewLine=null;

let historyStack=[];
let redoStack=[];
let drawnLayers=[];

/* 도구 선택 */

function setTool(tool,btn){

currentTool=tool;
linePoints=[];

if(previewLine){
map.removeLayer(previewLine);
previewLine=null;
}

/* 버튼 강조 */

document.querySelectorAll("#toolbar button").forEach(b=>{
b.classList.remove("selectedTool");
});

btn.classList.add("selectedTool");

}

/* 색상 */

function setPingColor(color,btn){

pingColor=color;

document.querySelectorAll("#colorPicker button").forEach(b=>{
b.style.outline="none";
});

btn.style.outline="3px solid white";

}

/* 전체 삭제 */

function clearAll(){

drawnLayers.forEach(layer=>{
map.removeLayer(layer);
});

drawnLayers=[];
historyStack=[];
redoStack=[];
linePoints=[];

}

/* 지도 클릭 */

map.on("click",function(e){

const point=[e.latlng.lat,e.latlng.lng];

/* 핑 */

if(currentTool==="ping"){

const marker=L.marker(point,{
icon:pingIcons[pingColor]
}).addTo(map);

drawnLayers.push(marker);
historyStack.push(marker);
redoStack=[];

marker.on("contextmenu",function(){
map.removeLayer(marker);
});

}

/* 선 */

if(currentTool==="line"){

if(linePoints.length>0){

const last=linePoints[linePoints.length-1];

if(Math.abs(last[0]-point[0])<5 && Math.abs(last[1]-point[1])<5){
linePoints=[];
if(previewLine){
map.removeLayer(previewLine);
previewLine=null;
}
return;
}

const line=L.polyline([last,point],{
color:pingColor,
weight:4
}).addTo(map);

drawnLayers.push(line);
historyStack.push(line);
redoStack=[];

line.on("contextmenu",function(){
map.removeLayer(line);
});

const dot=L.circleMarker(point,{
radius:5,
color:"#000",
weight:2,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);

drawnLayers.push(dot);
historyStack.push(dot);
redoStack=[];

}

if(linePoints.length===0){

const dot=L.circleMarker(point,{
radius:5,
color:"#000",
weight:2,
fillColor:"#fff",
fillOpacity:1
}).addTo(map);

drawnLayers.push(dot);
historyStack.push(dot);
redoStack=[];

}

linePoints.push(point);

}

});

/* 선 미리보기 */

map.on("mousemove",function(e){

if(currentTool!=="line") return;
if(linePoints.length===0) return;

const last=linePoints[linePoints.length-1];
const point=[e.latlng.lat,e.latlng.lng];

if(previewLine){
map.removeLayer(previewLine);
}

previewLine=L.polyline([last,point],{
color:pingColor,
weight:2,
dashArray:"5,5"
}).addTo(map);

});

/* Undo */

function undoLast(){

if(historyStack.length===0) return;

const last=historyStack.pop();

map.removeLayer(last);

redoStack.push(last);

}

/* Redo */

function redoLast(){

if(redoStack.length===0) return;

const layer=redoStack.pop();

layer.addTo(map);

historyStack.push(layer);

}

/* 단축키 */

document.addEventListener("keydown",function(e){

if(e.ctrlKey && e.key==="z") undoLast();
if(e.ctrlKey && e.key==="y") redoLast();

});

/* 우클릭 메뉴 차단 */

map.getContainer().addEventListener("contextmenu",function(e){
e.preventDefault();
});

</script>

</body>
</html>
