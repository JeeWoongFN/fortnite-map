<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Fortnite Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
margin:0;
height:100%;
background:#1e1e1e;
}

#map{
width:100%;
height:100%;
}

/* 지역 이름 스타일 */

.poi-label{
background:rgba(0,0,0,0);
border:none;
color:white;
font-size:18px;
font-weight:bold;
text-shadow:
2px 2px 4px black,
-2px -2px 4px black;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// 지도 생성
var map = L.map('map', {
    crs: L.CRS.Simple,
    minZoom: -1,
    maxZoom: 2,
    zoomSnap: 0.25
});

// 맵 이미지 크기 (현재 map.webp 기준)
var bounds = [[0,0],[2048,2048]];

// 맵 이미지 표시
var image = L.imageOverlay("map.png", bounds).addTo(map);

// 지도 중앙 맞추기
map.fitBounds(bounds);
map.setZoom(-0.5);


// 📍 지역 이름 추가 함수

function addPOI(x, y, name){

L.marker([x,y],{
opacity:0
})
.addTo(map)
.bindTooltip(name,{
permanent:true,
direction:"center",
className:"poi-label"
});

}


// 📍 지역 이름 표시 

addPOI(704,1438,"웡키랜드");
addPOI(444,1366,"팁톱 테라스");
addPOI(930,1438,"클로지 랏지");
addPOI(1225,1531,"라떼 랜딩");
addPOI(1399,1380,"페인티드 팜스");
addPOI(1335,1100,"샌디 스트립");
addPOI(897,1037,"리썰 랩스");
addPOI(1581,1063,"포어 필즈");
addPOI(519,1034,"범피 베이");
addPOI(573,826,"험블 힐스");
addPOI(416,630,"립프드 타이드");
addPOI(778,547,"배틀우드 불러바드");
addPOI(1048,664,"서스 스튜디오");
addPOI(1291,614,"클래시파이드 캐니언");



// 현재 핑 저장
let currentPing = null;

// 지도 클릭 이벤트
map.on("click", function(e) {

    let x = Math.round(e.latlng.lng);
    let y = Math.round(e.latlng.lat);

    // 기존 핑 제거
    if(currentPing){
        map.removeLayer(currentPing);
    }

    // 새 핑 생성
    currentPing = L.marker([y, x]).addTo(map);


});

</script>

</body>
</html>
